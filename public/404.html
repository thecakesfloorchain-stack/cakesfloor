<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>The Cakes Floor</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // ----------------------------------------------------------------------
      // This script takes the current url and converts it into a path parameter
      // inside query parameters, then redirects to index.html with it.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~25') +
        l.search.replace(/&/g, '~25') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
